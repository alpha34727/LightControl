<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Light Control Pro</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-container">
    <header class="glass-header">
      <div class="logo">
        <span class="logo-icon">💡</span>
        <h1>Light Control <span class="accent">Pro</span></h1>
      </div>
      <div class="status-panel">
        <div id="connection-status" class="status-indicator disconnected">
          <span class="status-dot"></span>
          <span class="status-text">未連接設備</span>
        </div>
        <button id="btn-connect" class="primary-btn">連接 USB-DMX512</button>
      </div>
    </header>

    <main class="main-content">
      <section class="controls-section glass-panel">
        <div class="controls-header">
          <h2>通道控制 <span id="current-page-label" class="page-badge">CH 0 - 31</span></h2>
          <div class="page-controls" id="page-buttons">
            <!-- Page buttons will be generated by JS -->
          </div>
        </div>
        
        <div class="sliders-container" id="sliders-grid">
          <!-- 32 Sliders will be generated by JS -->
        </div>
      </section>
    </main>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
