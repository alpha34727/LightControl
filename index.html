<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Light Control Pro (Premiere UI)</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-fullscreen">
    <!-- TOP NAVBAR -->
    <header class="glass-header">
      <div class="logo">
        <span class="logo-icon">💡</span>
        <h1>Light Control <span class="accent">Pro</span></h1>
      </div>
      
      <!-- Global Controls -->
      <div class="global-controls">
        <button id="btn-play" class="primary-btn">▶ 播放</button>
        <button id="btn-stop" class="primary-btn">⏹ 停止</button>
        <span id="time-display" class="time-display">00:00.00</span>
        
        <div class="divider"></div>
        
        <button id="btn-split-audio" class="primary-btn secondary" title="在當前時間點分割音訊">✂️ 分割音訊</button>
        <button id="btn-add-audio-track" class="primary-btn secondary">+ 音訊軌道</button>
        <button id="btn-add-light-track" class="primary-btn secondary">+ 燈光軌道</button>

        <div class="divider"></div>
        
        <div class="zoom-controls">
          <label>X-Zoom</label>
          <input type="range" id="zoom-x" min="10" max="400" value="100">
          <label>Y-Zoom</label>
          <input type="range" id="zoom-y" min="60" max="300" value="120">
        </div>
      </div>

      <div class="status-panel">
        <div id="connection-status" class="status-indicator disconnected">
          <span class="status-dot"></span>
          <span class="status-text">未連接設備</span>
        </div>
        <button id="btn-connect" class="primary-btn">連接 USB-DMX</button>
      </div>
    </header>

    <!-- UPPER HALF: MANUAL SLIDERS -->
    <section class="manual-section-half glass-panel">
      <div class="controls-header">
        <h2>監控與手動控制 <span id="current-page-label" class="page-badge">CH 0 - 31</span></h2>
        <div class="page-controls" id="page-buttons">
          <!-- Page buttons injected by JS -->
        </div>
      </div>
      <div class="sliders-container-scroll" id="sliders-scroll">
        <div class="sliders-container" id="sliders-grid">
          <!-- 32 Sliders injected by JS -->
        </div>
      </div>
    </section>

    <!-- LOWER HALF: TIMELINE EDITOR -->
    <section class="timeline-section-half">
      <!-- Left headers Pane -->
      <div class="timeline-headers-pane">
        <div class="pane-top-left">
           <span>軌道控制</span>
        </div>
        <div class="headers-scroll-container" id="headers-list">
           <!-- Headers injected via JS -->
        </div>
      </div>

      <!-- Right tracks Pane -->
      <div class="timeline-tracks-pane" id="timeline-editor-right">
        <div class="timeline-ruler" id="timeline-ruler">
          <canvas id="ruler-canvas"></canvas>
        </div>
        <div class="timeline-body" id="timeline-body">
          <div id="tracks-container">
            <!-- Overlay tracks (SVGs and Clips injected by JS) -->
          </div>
          <!-- Playhead cursor -->
          <div id="playhead"></div>
        </div>
      </div>
    </section>
  </div>

  <script src="timeline.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
